<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mensagens Contato | Closet Drii</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../shared/css/global.css" />
    <link rel="stylesheet" href="contact_adm.css" />
  </head>

  <body>
    <main class="admin-crud-layout">
        <header class="admin-dashboard-header">
            <div>
                <h1>Mensagens de Atendimento</h1>
                <p>Monitore e responda as dúvidas, sugestões e solicitações enviadas pelas clientes.</p>
            </div>
            <div class="counter-badge-wrapper">
                Mensagens na Aba: <span id="pending-count">0</span>
            </div>
        </header>

        <section class="admin-filters-wrapper">
            <button type="button" class="status-tab active" data-status="pendentes">
                <i class="fas fa-clock"></i> Pendentes
            </button>
            <button type="button" class="status-tab" data-status="respondidas">
                <i class="fas fa-check-circle"></i> Respondidas
            </button>
        </section>

        <div id="messages-grid-container" class="messages-grid">
      <div
        id="empty-messages-alert"
        class="empty-dashboard-state"
        style="display: none"
      >
        <i class="fas fa-check-circle"></i>
        <h3>Caixa de entrada limpa!</h3>
        <p>Nenhuma mensagem pendente de resposta no momento.</p>
      </div>
    </main>

    <template id="template-message-card">
      <section class="message-card">
        <header class="message-header">
          <div>
            <h2 class="client-name"></h2>
            <h3 class="client-email"></h3>
          </div>
          <span class="badge-subject"></span>
        </header>

        <div class="message-body">
          <p class="message-text"></p>
        </div>

        <footer class="message-footer">
          <button type="button" class="btn-read-action">
            <i class="fas fa-check"></i> Marcar como Respondida
          </button>
        </footer>
      </section>
    </template>

    <div id="snackbar-placeholder"></div>

    <script type="module" src="../../utils/loader.js"></script>
    <script type="module" src="./contact_adm.js"></script>
  </body>
</html>
