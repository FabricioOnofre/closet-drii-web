<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Cadastro | Closet Drii</title>

    <!-- FONT -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../../shared/css/global.css" />
    <link rel="stylesheet" href="../../shared/components/header/header.css" />
    <link
      rel="stylesheet"
      href="../../shared/components/snackbar/snackbar.css"
    />
    <link rel="stylesheet" href="./signup.css" />
  </head>

  <body id="cadastro-body">
    <!-- BACKGROUND DECOR -->
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <main class="auth-wrapper">
      <div class="login-card">

        <!-- LOGO -->
        <div class="brand-area">
          <img
            src="../../../src/assets/ig/logo.jpg"
            alt="Closet Drii"
            class="brand-logo"
          />

          <span class="brand-badge">
            Moda Feminina
          </span>
        </div>

        <!-- TITLE -->
        <h1>Crie sua conta</h1>

        <p class="subtitle">
          Faça parte da Closet Drii e receba novidades, descontos exclusivos
          e lançamentos em primeira mão.
        </p>

        <!-- FORM -->
        <form id="cadastro-form">

          <!-- NOME -->
          <div class="input-group">
            <label for="name">Nome Completo</label>

            <div class="input-icon">
              <i class="fa-regular fa-user"></i>

              <input
                type="text"
                id="name"
                required
                placeholder="Digite seu nome completo"
              />
            </div>
          </div>

          <!-- EMAIL + PHONE -->
          <div class="input-row">

            <div class="input-group">
              <label for="email">E-mail</label>

              <div class="input-icon">
                <i class="fa-regular fa-envelope"></i>

                <input
                  type="email"
                  id="email"
                  required
                  placeholder="seuemail@exemplo.com"
                />
              </div>
            </div>

            <div class="input-group">
              <label for="phone">WhatsApp</label>

              <div class="input-icon">
                <i class="fa-brands fa-whatsapp"></i>

                <input
                  type="tel"
                  id="phone"
                  required
                  placeholder="(00) 90000-0000"
                />
              </div>
            </div>
          </div>

          <!-- SENHAS -->
          <div class="input-row">

            <div class="input-group">
              <label for="password">Senha</label>

              <div class="input-icon">
                <i class="fa-solid fa-lock"></i>

                <input
                  type="password"
                  id="password"
                  required
                  placeholder="Crie uma senha forte"
                />
              </div>
            </div>

            <div class="input-group">
              <label for="confirmPassword">Confirmar Senha</label>

              <div class="input-icon">
                <i class="fa-solid fa-shield-heart"></i>

                <input
                  type="password"
                  id="confirmPassword"
                  required
                  placeholder="Repita sua senha"
                />
              </div>
            </div>
          </div>

          <!-- PASSWORD STRENGTH -->
          <div class="password-strength">
            <div class="strength-bar"></div>
          </div>

          <span class="password-text">
            Use letras, números e caracteres especiais.
          </span>

          <!-- TERMS -->
          <div class="terms">
            <input type="checkbox" id="terms" required />

            <label for="terms">
              Concordo com os
              <a href="#">Termos de Uso</a>
              e
              <a href="#">Política de Privacidade</a>
            </label>
          </div>

          <!-- BUTTON -->
          <button type="submit" class="btn-primary">
            <i class="fa-solid fa-user-plus"></i>
            Finalizar Cadastro
          </button>

          <!-- DIVIDER -->
          <div class="divider">
            <span>ou continue com</span>
          </div>

          <!-- SOCIAL -->
          <div class="social-login">

            <button type="button" class="social-btn google">
              <i class="fa-brands fa-google"></i>
              Google
            </button>

            <button type="button" class="social-btn facebook">
              <i class="fa-brands fa-facebook-f"></i>
              Facebook
            </button>

          </div>

          <!-- LOGIN -->
          <div class="login-links">
            <span>Já possui uma conta?</span>

            <a href="../login/login.html">
              Fazer login
            </a>
          </div>
        </form>
      </div>
    </main>

    <!-- SNACKBAR -->
    <div id="snackbar-placeholder"></div>

    <!-- SCRIPTS -->
    <script src="../../utils/loader.js"></script>

    <script type="module" src="./signup.js"></script>

    <script
      type="module"
      src="../../shared/components/snackbar/snackbar.js"
    ></script>

    <script
      type="module"
      src="../../shared/components/header/header.js"
    ></script>
  </body>
</html>
