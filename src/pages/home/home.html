<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Closet Drii | Moda Feminina</title>
    <link rel="stylesheet" href="../../shared/css/global.css" />
    <link rel="stylesheet" href="../../shared/components/header/header.css" />
    <link
      rel="stylesheet"
      href="../../shared/components/snackbar/snackbar.css"
    />
    <link rel="stylesheet" href="./home.css" />
  </head>
  <body>
    <main class="home-wrapper">
      <section class="search-section">
        <h1>O que você procura hoje?</h1>
        <div class="search-box">
          <input
            type="text"
            placeholder="Buscar por peças, cores ou estilos..."
          />
          <button><i class="fas fa-search"></i></button>
        </div>

        <div class="quick-search">
          <button class="chip">Vestidos</button>
          <button class="chip">Calças</button>
          <button class="chip">Blusas</button>
          <button class="chip">Conjuntos</button>
          <button class="chip">Acessórios</button>
        </div>
      </section>

      <section class="products-section">
        <h2>Destaques da Semana</h2>
        <div id="product-best-seller" class="product-grid"></div>


        <h2>Ofertas Imperdíveis</h2>
        <div id="product-offer" class="product-grid"></div>


        <template id="template-card">
          <div class="product-card-component">
            <div class="image-wrapper">
              <img class="produto-img" src="" alt="" />
            </div>
            <div class="card-info">
              <h3 class="produto-nome"></h3>
              <p class="produto-preco"></p>
            </div>
            <button class="add-btn">Adicionar</button>
          </div>
        </template>
      </section>
    </main>

    <div id="snackbar-placeholder"></div>

    <script type="module" src="../../utils/loader.js"></script>
    <script
      type="module"
      src="../../shared/components/header/header.js"
    ></script>
    <script
      type="module"
      src="../../shared/components/snackbar/snackbar.js"
    ></script>
    <script type="module" src="./home.js"></script>
  </body>
</html>
