<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - JJF Solutions</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../shared/css/global.css" />
    <link rel="stylesheet" href="../../shared/components/header/header.css" />
    <link
      rel="stylesheet"
      href="../../shared/components/snackbar/snackbar.css"
    />
    <link rel="stylesheet" href="./login.css" />
  </head>
  <body id="login-body">
    <main class="auth-wrapper">
      <div class="login-card">
        <h1>Bem-vindo(a) de volta!</h1>
        <p>
          Faça login para acompanhar seus pedidos e aproveitar promoções
          exclusivas.
        </p>

        <form id="login-form">
          <div class="input-row">
            <div class="input-group">
              <label for="email">E-mail</label>
              <input
                type="email"
                id="email"
                value="meu@gmail.com"
                required
                placeholder="seuemail@exemplo.com"
              />
            </div>

            <div class="input-group">
              <label for="password">Senha</label>
              <input
                type="password"
                id="password"
                value="1234"
                required
                placeholder="Sua senha secreta"
              />
              <a href="#">Esqueci minha senha</a>
            </div>
          </div>

          <button type="submit" class="btn-primary">Entrar</button>

          <div class="login-links">
            <span>Não tem uma conta?</span>
            <a href="../../pages/singup/signup.html">Cadastre-se aqui</a>
          </div>
        </form>
      </div>
    </main>

    <div id="snackbar-placeholder"></div>


    <script type="module" src="./login.js"></script>
    <script type="module" src="../../utils/loader.js"></script>
    <script
      type="module"
      src="../../shared/components/snackbar/snackbar.js"
    ></script>
  </body>
</html>
