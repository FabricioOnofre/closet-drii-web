<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produtos | Closet Drii</title>
    <link rel="stylesheet" href="../../shared/css/global.css" />
    <link rel="stylesheet" href="../../shared/components/header/header.css" />
    <link rel="stylesheet" href="../../shared/components/snackbar/snackbar.css" />
    <link rel="stylesheet" href="./produtos.css" />
</head>

<body>

    <main class="products-wrapper">

        <header class="page-header">
            <div class="header-content">
                <h1>Nossa Coleção</h1>
                <p>Explore peças exclusivas pensadas para realçar a sua autenticidade e estilo.</p>
            </div>
        </header>

        <div class="products-layout">

            <aside class="filters-sidebar">
                <div class="filter-box">
                    <h3>Categorias</h3>
                    <ul class="filter-list">
                        <li><label><input type="checkbox" checked /> Todos</label></li>
                        <li><label><input type="checkbox" /> Vestidos</label></li>
                        <li><label><input type="checkbox" /> Calças</label></li>
                        <li><label><input type="checkbox" /> Blusas</label></li>
                        <li><label><input type="checkbox" /> Conjuntos</label></li>
                        <li><label><input type="checkbox" /> Acessórios</label></li>
                    </ul>
                </div>

                <div class="filter-box">
                    <h3>Preço</h3>
                    <div class="price-range">
                        <input type="range" min="0" max="500" step="10" value="500" id="price-slider" />
                        <div class="price-labels">
                            <span>R$ 0</span>
                            <span id="price-value">Até R$ 500</span>
                        </div>
                    </div>
                </div>

                <div class="filter-box">
                    <h3>Tamanho</h3>
                    <div class="size-chips">
                        <button class="size-chip">P</button>
                        <button class="size-chip active">M</button>
                        <button class="size-chip">G</button>
                        <button class="size-chip">GG</button>
                    </div>
                </div>
            </aside>

            <section class="catalog-section">

                <div class="catalog-controls">
                    <p class="products-count">Mostrando <strong>12</strong> produtos</p>
                    <div class="sort-wrapper">
                        <label for="sort-select">Ordenar por:</label>
                        <select id="sort-select">
                            <option value="news">Novidades</option>
                            <option value="price-asc">Menor Preço</option>
                            <option value="price-desc">Maior Preço</option>
                            <option value="best-sellers">Mais Vendidos</option>
                        </select>
                    </div>
                </div>

                <div id="product-catalog-grid" class="product-grid"></div>

                <template id="template-card">
                    <div class="product-card-component">
                        <div class="image-wrapper">
                            <img class="produto-img" src="" alt="" />
                            <span class="product-badge">Novo</span>
                        </div>
                        <div class="card-info">
                            <h3 class="produto-nome"></h3>
                            <p class="produto-preco"></p>
                        </div>
                        <button class="add-btn">
                            Adicionar ao carrinho
                        </button>
                    </div>
                </template>

            </section>

        </div>

    </main>

    <div id="snackbar-placeholder"></div>

    <script type="module" src="../../utils/loader.js"></script>
    <script type="module" src="../../shared/components/header/header.js"></script>
    <script type="module" src="../../shared/components/snackbar/snackbar.js"></script>
    <script type="module" src="./produtos.js"></script>
</body>

</html>
